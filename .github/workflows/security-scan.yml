name: Security — Image Scan & Dependency Audit

on:
  schedule:
    - cron: "0 3 * * 1"          # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:

  trivy-scan:
    name: Trivy Image Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    strategy:
      matrix:
        service: [api-gateway, enroller, collector, notifier, portal, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          CONTEXT="services/${{ matrix.service }}"
          [ "${{ matrix.service }}" = "frontend" ] && CONTEXT="frontend"
          docker build -t scan-target:${{ matrix.service }} "$CONTEXT"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    "scan-target:${{ matrix.service }}"
          format:       "sarif"
          output:       "trivy-${{ matrix.service }}.sarif"
          severity:     "CRITICAL,HIGH"
          exit-code:    "1"           # Fail on CRITICAL or HIGH CVEs

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category:   "${{ matrix.service }}"

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit all Python services
        run: |
          for svc in api-gateway enroller collector notifier; do
            echo "Auditing $svc..."
            pip-audit -r services/$svc/requirements.txt \
              --desc on \
              --format columns
          done
          echo "Auditing test dependencies..."
          pip-audit -r tests/requirements-test.txt --desc on --format columns

  npm-audit:
    name: Frontend NPM Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

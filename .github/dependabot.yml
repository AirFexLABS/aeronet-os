version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/services/api-gateway"
    schedule: { interval: "weekly" }

  - package-ecosystem: "pip"
    directory: "/services/enroller"
    schedule: { interval: "weekly" }

  - package-ecosystem: "pip"
    directory: "/services/collector"
    schedule: { interval: "weekly" }

  - package-ecosystem: "pip"

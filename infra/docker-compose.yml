# Docker Compose orchestration for AeroNet OS services
# Target host: 32GB RAM x86 — production hardened

services:

  # ---------------------------------------------------------------------------
  # Nginx — TLS-terminating reverse proxy (production entry point)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: aeronet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - aeronet-internal
    depends_on:
      - api-gateway
      - frontend
      - portal
      - grafana
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m

  # ---------------------------------------------------------------------------
  # PostgreSQL — device inventory and audit log store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aeronet-postgres
    env_file: ../.env.secret
    environment:
      POSTGRES_DB: aeronet
      POSTGRES_USER: aeronet
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - aeronet-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeronet -d aeronet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4.0"
        reservations:
          memory: 4g

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:11.4.0
    env_file: ../.env.secret
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY:     ${SECRET_KEY}
      GF_DATABASE_PASSWORD:       ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD:          ${POSTGRES_PASSWORD}
      GF_SERVER_ROOT_URL:         https://grafana.aeronet.local
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    networks:
      - aeronet-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
        reservations:
          memory: 2g

# ---------------------------------------------------------------------------
# API Gateway — FastAPI RBAC + device inventory REST API
# ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: ../services/api-gateway
    container_name: aeronet-api-gateway
    env_file: ../.env.secret
    environment:
      DATABASE_URL: postgresql://aeronet:${POSTGRES_PASSWORD}@postgres:5432/aeronet?sslmode=disable
      ENROLLER_URL: http://enroller:8002
    networks:
      - aeronet-internal
    depends_on:
      postgres:
        condition: service_healthy
      enroller:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m


  # ---------------------------------------------------------------------------
  # Collector — Juniper MIST API polling worker
  # ---------------------------------------------------------------------------
  collector:
    build:
      context: ../services/collector
    env_file: ../.env.secret
    environment:
      DATABASE_URL: postgresql://aeronet:${POSTGRES_PASSWORD}@postgres:5432/aeronet?sslmode=disable
      NOTIFIER_URL: http://notifier:8001
    networks:
      - aeronet-internal
    depends_on:
      postgres:
        condition: service_healthy
      notifier:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 1g

# ---------------------------------------------------------------------------
# Enroller — Nmap discovery + Scrapli SSH provisioning worker
# ---------------------------------------------------------------------------
  enroller:
    build:
      context: ../services/enroller
    env_file: ../.env.secret
    environment:
      DATABASE_URL: postgresql://aeronet:${POSTGRES_PASSWORD}@postgres:5432/aeronet?sslmode=disable
      NOTIFIER_URL: http://notifier:8001
      SCAN_TARGETS: ${SCAN_TARGETS:-}
      SCAN_INTERVAL_MINUTES: ${SCAN_INTERVAL_MINUTES:-30}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-}
    networks:
      - aeronet-internal
    depends_on:
      postgres:
        condition: service_healthy
      notifier:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m


  # ---------------------------------------------------------------------------
  # Notifier — Two-way Twilio/Telegram alert bridge
  # ---------------------------------------------------------------------------
  notifier:
    build:
      context: ../services/notifier
    env_file: ../.env.secret
    environment:
      DATABASE_URL: postgresql://aeronet:${POSTGRES_PASSWORD}@postgres:5432/aeronet?sslmode=disable
    networks:
      - aeronet-internal
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m

  # ---------------------------------------------------------------------------
  # Portal — Go proxy gatekeeper for Grafana iframes
  # ---------------------------------------------------------------------------
  portal:
    build:
      context: ../services/portal
    env_file: ../.env.secret
    environment:
      SECRET_KEY: ${SECRET_KEY}
      GRAFANA_URL: http://grafana:3000
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      PORTAL_PORT: "8080"
    networks:
      - aeronet-internal
    depends_on:
      - grafana
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m

  # ---------------------------------------------------------------------------
  # Frontend — React + Tailwind CSS
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
    #volumes:
    #  - assets_data:/usr/share/nginx/html/assets
    networks:
      - aeronet-internal
    depends_on:
      - api-gateway
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection and storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aeronet-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - aeronet-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m

  # ---------------------------------------------------------------------------
  # Postgres Exporter — Prometheus metrics for PostgreSQL
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: aeronet-pg-exporter
    restart: unless-stopped
    env_file: ../.env.secret
    environment:
      DATA_SOURCE_NAME: "postgresql://aeronet:${POSTGRES_PASSWORD}@postgres:5432/aeronet?sslmode=disable"
    networks:
      - aeronet-internal
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
        reservations:
          memory: 64m

# =============================================================================
# Networks
# =============================================================================
networks:
  aeronet-internal:
    driver: bridge

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
  grafana_data:
  #assets_data:
  prometheus_data:

# Connection limits
max_connections = 100

# Memory (sized for 8GB mem_limit)
shared_buffers  = 2GB
work_mem        = 64MB
effective_cache_size = 6GB
maintenance_work_mem = 512MB

# WAL & checkpointing
wal_buffers            = 64MB
checkpoint_completion_target = 0.9
max_wal_size           = 2GB
min_wal_size           = 512MB

# Logging (ISO 27001: log all connections and DDL)
log_connections        = on
log_disconnections     = on
log_duration           = off
log_statement          = 'ddl'
log_min_duration_statement = 2000
log_timezone           = 'UTC'
log_line_prefix        = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Security
ssl                    = off
password_encryption    = scram-sha-256

# Locale
timezone               = 'UTC'
lc_messages            = 'en_US.UTF-8'
listen_addresses = '*'

[server]
root_url = http://localhost:3000
serve_from_sub_path = false

[security]
admin_user = admin
admin_password = ${GRAFANA_ADMIN_PASSWORD}
secret_key = ${SECRET_KEY}
disable_gravatar = true
cookie_secure = false
cookie_samesite = lax
x_frame_options = SAMEORIGIN
content_security_policy = true

[auth.anonymous]
enabled = false

[users]
allow_sign_up = false
allow_org_create = false
default_theme = dark

[dashboards]
default_home_dashboard_path = /etc/grafana/dashboards/device-inventory.json

[log]
mode = console
level = warn

[unified_alerting]
enabled = true

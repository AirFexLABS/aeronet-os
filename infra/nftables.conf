#!/usr/sbin/nft -f
# AeroNet OS — nftables firewall rules
# Deploy: sudo cp infra/nftables.conf /etc/nftables.conf && sudo systemctl restart nftables
#
# Note: Docker manages its own iptables rules (ip filter / ip nat tables).
# Do NOT include those here — they are auto-generated by Docker on startup.

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;
        ct state established,related accept
        iif "lo" accept
        iif "OUTSIDE" tcp dport 2222 ct state new meter ssh_limit size 65535 { ip saddr limit rate 5/minute burst 5 packets } accept
        iif "OUTSIDE" tcp dport { 80, 443 } accept
        iif "INSIDE.10" accept
        ip protocol icmp accept
        ip6 nexthdr ipv6-icmp accept
        log prefix "nft-drop-input: " flags all
        drop
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        ct state established,related accept
        # Allow external traffic to reach Docker containers on published ports
        oifname "br-7d1fe6da1078" tcp dport { 80, 443 } accept
        log prefix "nft-drop-forward: " flags all
        drop
    }
}

table inet nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
    }
}

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers applied to all responses
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hide Nginx version
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=grafana:10m rate=60r/m;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # API Gateway
    server {
        listen 443 ssl;
        server_name api.aeronet.local;

        ssl_certificate     /etc/nginx/certs/aeronet.crt;
        ssl_certificate_key /etc/nginx/certs/aeronet.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://api-gateway:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://api-gateway:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Frontend
    server {
        listen 443 ssl;
        server_name aeronet.local;

        ssl_certificate     /etc/nginx/certs/aeronet.crt;
        ssl_certificate_key /etc/nginx/certs/aeronet.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://frontend:5173;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Grafana
    server {
        listen 443 ssl;
        server_name grafana.aeronet.local;

        ssl_certificate     /etc/nginx/certs/aeronet.crt;
        ssl_certificate_key /etc/nginx/certs/aeronet.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            limit_req zone=grafana burst=30 nodelay;
            proxy_pass         http://grafana:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}

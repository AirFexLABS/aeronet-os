worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers applied to all responses
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin"        always;
    #add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hide Nginx version
    server_tokens off;

    # ── TLS defaults (shared by all server blocks) ──
    ssl_certificate     /etc/nginx/certs/aeronet.crt;
    ssl_certificate_key /etc/nginx/certs/aeronet.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Default HTTPS server — handles IP-based and unmatched connections
    server {
        listen 443 ssl default_server;
        server_name _;

        location /api/ {
            set $upstream_api http://api-gateway:8000;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         $upstream_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            set $upstream_frontend http://frontend:5173;
            proxy_pass         $upstream_frontend;
            proxy_set_header   Host              frontend;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 300;
        }
    }


    # API Gateway
    server {
        listen 443 ssl;
        server_name api.aeronet.local;

        location /auth/ {
            set $upstream_api http://api-gateway:8000;
            proxy_pass         $upstream_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            set $upstream_api http://api-gateway:8000;
            proxy_pass         $upstream_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Frontend
    server {
        listen 443 ssl;
        server_name aeronet.local;

        # Proxy /api requests to the API gateway (strip /api prefix)
        location /api/ {
            set $upstream_api http://api-gateway:8000;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         $upstream_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            set $upstream_frontend http://frontend:5173;
            proxy_pass         $upstream_frontend;
            proxy_set_header   Host              frontend;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Grafana
    server {
        listen 443 ssl;
        server_name grafana.aeronet.local;

        location / {
            set $upstream_grafana http://grafana:3000;
            proxy_pass         $upstream_grafana;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
